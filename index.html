<!DOCTYPE html>
<html>
<head>
  <title>profile</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* background glow */
    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: rgba(255,255,255,0.05);
      filter: blur(120px);
      border-radius: 50%;
      animation: move 10s infinite alternate;
    }

    @keyframes move {
      from { transform: translate(-100px, -100px); }
      to { transform: translate(100px, 100px); }
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      text-align: center;
      width: 300px;
    }

    .name {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      background: rgba(255,255,255,0.08);
      padding: 10px;
      margin: 6px 0;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.15);
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <!-- fake profile -->
  <div class="card" id="profile">
    <div class="name">glace</div>
    <div class="desc">loading profile...</div>

    <a class="btn">discord</a>
    <a class="btn">instagram</a>
    <a class="btn">tiktok</a>
  </div>

  <!-- troll message -->
  <div class="card hidden" id="troll">
    <div class="name">well looks like you care enough 💀</div>
    <div class="desc">that’s kinda crazy ngl</div>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById("profile").classList.add("hidden");
      document.getElementById("troll").classList.remove("hidden");
    }, 2000);
  </script>

</body>
</html>
